<!DOCTYPE html>
<html>
     <head>
        <title>Basket</title>
        <!-- CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

        <!-- jQuery and JS bundle w/ Popper.js -->
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="#">Basket Python</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="index">Accueil <span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('createMatch') }}">Créer un match</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('player') }}">Mes matchs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('update') }}">Mes infos</a>
                    </li>
                </ul>
                <span class="navbar-text">
                    <form action="{{ url_for('logout') }}">
                        <input type="submit" class="btn btn-secondary" value="Déconnexion" />
                    </form>
                </span>
            </div>
        </nav>
        <h1 style="text-align: center;">Matchs auxquels je participe</h1>
        <br>
        <table border="1"  style="margin: auto;width: 500px;">
            {% for game in mygames %}
            <tr>
                <td> <button type="button"  data-toggle="dropdown" style="width: 500px; height: 75px;">{{ game[1] }} au {{ game[2] }} le {{ game[3] }}</button> 
                    <ul class="dropdown-menu" role="menu" style="width: 500px;">
                        <li style="width: 500px;">Heure : {{ game[4] }}</li>
                        <li style="width: 500px;">Age maximum requis: {{ game[5] }}</li>
                        <li style="width: 500px;">Age minimum requis: {{ game[6] }}</li>
                        <form action="{{ url_for('delgame') }}" method="POST">
                        <input type="hidden" name="id_game" id="id_game" value="{{ game[0] }}">
                        <input type="submit" value="Je ne participe! plus" style="width: 500px;">
                        </form>
                    </ul>
                </td>
            </tr>
            {% endfor %}

        </table>
    </body>
</html>
